# --- Packages that require conditional logic or differ between distros ---

- name: Install CPU microcode (Intel)
  apt:
    name: intel-microcode
    state: present
  when: intel_cpu
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install CPU microcode (AMD)
  apt:
    name: amd64-microcode
    state: present
  when: not intel_cpu
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install rng-tools5 (preferred)
  apt:
    name: rng-tools5
    state: present
  register: rng_tools5_result
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install rng-tools (fallback if rng-tools5 unavailable)
  apt:
    name: rng-tools
    state: present
  when: rng_tools5_result is failed
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Check if firefox package exists in repos
  command: apt-cache show firefox
  register: firefox_pkg
  changed_when: false
  failed_when: false

- name: Install Firefox (Ubuntu)
  apt:
    name:
      - firefox
      - firefox-locale-es
    state: present
  when: firefox_pkg.rc == 0
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install Firefox ESR (Debian)
  apt:
    name:
      - firefox-esr
      - firefox-esr-l10n-es-es
    state: present
  when: firefox_pkg.rc != 0
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Check if chromium-browser package exists in repos
  command: apt-cache show chromium-browser
  register: chromium_browser_pkg
  changed_when: false
  failed_when: false

- name: Install Chromium (Ubuntu)
  apt:
    name:
      - chromium-browser
      - chromium-browser-l10n
      - chromium-codecs-ffmpeg-extra
    state: present
  when: chromium_browser_pkg.rc == 0
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install Chromium (Debian)
  apt:
    name:
      - chromium
      - chromium-l10n
    state: present
  when: chromium_browser_pkg.rc != 0
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install Debian non-free firmware
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - firmware-linux
    - firmware-linux-free
    - firmware-linux-nonfree
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install VA-API drivers (naming differs between distros/versions)
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - i965-va-driver
    - libva-intel-vaapi-driver
    - libegl1-mesa-drivers
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install Ubuntu-specific packages
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - ppa-purge
    - ntfs-config
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install update-motd without recommends (Ubuntu)
  apt:
    name: update-motd
    state: present
    install_recommends: false
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Upgrade all installed packages
  apt:
    upgrade: dist
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Clean apt cache
  apt:
    autoclean: true
