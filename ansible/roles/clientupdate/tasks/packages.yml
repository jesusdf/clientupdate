---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install required packages
  apt:
    name:
      - bash
      - wget
      - ca-certificates
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

